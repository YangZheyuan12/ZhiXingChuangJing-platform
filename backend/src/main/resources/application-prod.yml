spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/zhixingchuangjing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai
    show-sql: false

app:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://minio:9000}
      public-base-url: ${MINIO_PUBLIC_BASE_URL:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:zxcyj-assets}
