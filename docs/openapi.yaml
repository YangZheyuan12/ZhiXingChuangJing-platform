components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ClassId:
      in: path
      name: classId
      required: true
      schema:
        type: integer
        format: int64
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: integer
        format: int64
    ExhibitionId:
      in: path
      name: exhibitionId
      required: true
      schema:
        type: integer
        format: int64
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        format: int64
    DigitalHumanId:
      in: path
      name: digitalHumanId
      required: true
      schema:
        type: integer
        format: int64
    EquipmentId:
      in: path
      name: equipmentId
      required: true
      schema:
        type: integer
        format: int64
    ResourceId:
      in: path
      name: resourceId
      required: true
      schema:
        type: integer
        format: int64
    SubmissionId:
      in: path
      name: submissionId
      required: true
      schema:
        type: integer
        format: int64
  responses:
    SuccessResponse:
      description: 操作成功
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            code: 0
            message: ok
            data: {}
            requestId: 4f9b6e24e2ef4f4f9d6c
    ErrorResponse:
      description: 业务异常
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: 40100
                message: 未登录或 token 失效
                data: null
                requestId: 4f9b6e24e2ef4f4f9d6c
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true
        requestId:
          type: string
      required: [code, message, requestId]
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 40001
        message:
          type: string
          example: 参数错误
        data:
          nullable: true
        requestId:
          type: string
      required: [code, message, requestId]

    UserRole:
      type: string
      enum: [student, teacher, parent, admin, visitor]
    TaskStatus:
      type: string
      enum: [draft, published, closed, archived]
    ExhibitionStatus:
      type: string
      enum: [draft, published, archived]
    ExhibitionVisibility:
      type: string
      enum: [private, class, public]
    SubmissionStatus:
      type: string
      enum: [submitted, reviewed, returned]
    AssetType:
      type: string
      enum: [image, video, audio, document, model]
    AssetSourceType:
      type: string
      enum: [upload, platform, museum]

    SchoolInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    ClassInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        grade:
          type: string
        academicYear:
          type: string

    SimpleUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        role:
