spring:
  application:
    name: zhixingchuangjing-platform
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: change-this-secret-in-production-change-this-secret
      expiration-seconds: 7200
      refresh-expiration-seconds: 604800
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      public-base-url: ${MINIO_PUBLIC_BASE_URL:http://127.0.0.1:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:zxcyj-assets}
