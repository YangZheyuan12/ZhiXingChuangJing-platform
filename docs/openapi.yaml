openapi: 3.0.3
info:
  title: 知行创境教育创作平台 API
  version: 1.0.0
  description: |
    基于《知行创境》教育创作平台 V2.0 PRD 整理的后端接口 OpenAPI 文档。
    基础路径为 `/api/v1`，认证方式为 Bearer Token。
servers:
  - url: /api/v1
    description: Default API Server
tags:
  - name: Auth
    description: 认证与账户
  - name: Dashboard
    description: 首页工作台
  - name: Classes
    description: 班级与公告
  - name: Tasks
    description: 课程与任务中心
  - name: Exhibitions
    description: 创作中心与展厅管理
  - name: Assets
    description: 媒体素材
  - name: DigitalHuman
    description: AI 数字人
  - name: Museum
    description: 博物馆资源
  - name: Submissions
    description: 提交与教师评价
  - name: Community
    description: 社区展厅与评论互动
  - name: Users
    description: 个人中心
  - name: Notifications
    description: 消息通知
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginData'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /users/me/profile:
    put:
      tags: [Auth]
      summary: 修改个人资料
      operationId: updateMyProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /users/me/password:
    put:
      tags: [Auth]
      summary: 修改密码
      operationId: updateMyPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /dashboard/overview:
    get:
      tags: [Dashboard]
      summary: 获取首页工作台数据
      operationId: getDashboardOverview
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/UserRole'
          description: 前端按角色切换视图时传入
      responses:
        '200':
          description: 工作台数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardOverview'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /classes:
    get:
      tags: [Classes]
      summary: 获取我的班级列表
      operationId: getMyClasses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 班级列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ClassInfo'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /classes/{classId}:
    get:
      tags: [Classes]
      summary: 获取班级详情
      operationId: getClassDetail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClassId'
      responses:
        '200':
          description: 班级详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClassDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /classes/{classId}/members:
    get:
      tags: [Classes]
      summary: 获取班级成员
      operationId: getClassMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClassId'
      responses:
        '200':
          description: 班级成员列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ClassMember'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /classes/{classId}/announcements:
    get:
      tags: [Classes]
      summary: 获取班级公告列表
      operationId: getClassAnnouncements
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClassId'
      responses:
        '200':
          description: 公告列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Announcement'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Classes]
      summary: 发布班级公告
      operationId: createAnnouncement
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClassId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnnouncementRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Announcement'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tasks:
    get:
      tags: [Tasks]
      summary: 获取任务列表
      operationId: getTasks
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: classId
          schema:
            type: integer
            format: int64
        - in: query
          name: keyword
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 任务分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PagedTaskSummary'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Tasks]
      summary: 创建任务
      operationId: createTask
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: 获取任务详情
      operationId: getTaskDetail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 任务详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Tasks]
      summary: 更新任务
      operationId: updateTask
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tasks/{taskId}/excellent-exhibitions:
    get:
      tags: [Tasks]
      summary: 获取任务优秀作品
      operationId: getExcellentExhibitionsByTask
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 优秀作品列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExhibitionSummary'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tasks/{taskId}/progress:
    get:
      tags: [Tasks]
      summary: 教师查看任务进度
      operationId: getTaskProgress
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 任务进度
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskProgress'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tasks/{taskId}/submit:
    post:
      tags: [Submissions]
      summary: 提交任务作品
      operationId: submitTaskWork
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubmissionDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /tasks/{taskId}/submissions:
    get:
      tags: [Submissions]
      summary: 获取任务提交记录
      operationId: getTaskSubmissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 提交记录列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SubmissionDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /exhibitions:
    get:
      tags: [Exhibitions]
      summary: 获取我的展厅列表
      operationId: getMyExhibitions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: taskId
          schema:
            type: integer
            format: int64
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ExhibitionStatus'
        - in: query
          name: keyword
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 展厅分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PagedExhibitionSummary'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Exhibitions]
      summary: 创建展厅
      operationId: createExhibition
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExhibitionRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExhibitionDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /exhibitions/{exhibitionId}:
    get:
      tags: [Exhibitions]
      summary: 获取展厅详情
      operationId: getExhibitionDetail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      responses:
        '200':
          description: 展厅详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExhibitionDetail'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Exhibitions]
      summary: 更新展厅基础信息
      operationId: updateExhibition
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExhibitionRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /exhibitions/{exhibitionId}/members:
    get:
      tags: [Exhibitions]
      summary: 获取协作者列表
      operationId: getExhibitionMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      responses:
        '200':
          description: 协作者列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExhibitionMember'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Exhibitions]
      summary: 邀请协作者
      operationId: addExhibitionMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddExhibitionMembersRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /exhibitions/{exhibitionId}/versions:
    get:
      tags: [Exhibitions]
      summary: 获取版本历史
      operationId: getExhibitionVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      responses:
        '200':
          description: 版本历史列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExhibitionVersion'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Exhibitions]
      summary: 保存展厅版本
      operationId: saveExhibitionVersion
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveExhibitionVersionRequest'
      responses:
        '200':
          description: 保存成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExhibitionVersion'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /exhibitions/{exhibitionId}/viewer:
    get:
      tags: [Exhibitions]
      summary: 获取观众预览数据
      operationId: getExhibitionViewer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      responses:
        '200':
          description: 观众模式数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExhibitionViewerData'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /exhibitions/{exhibitionId}/publish:
    post:
      tags: [Exhibitions]
      summary: 发布展厅
      operationId: publishExhibition
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishExhibitionRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /exhibitions/{exhibitionId}/digital-human:
    get:
      tags: [DigitalHuman]
      summary: 获取展厅数字人详情
      operationId: getExhibitionDigitalHuman
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      responses:
        '200':
          description: 数字人详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DigitalHuman'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [DigitalHuman]
      summary: 创建或更新数字人
      operationId: upsertExhibitionDigitalHuman
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertDigitalHumanRequest'
      responses:
        '200':
          description: 保存成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DigitalHuman'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets/upload:
    post:
      tags: [Assets]
      summary: 上传素材
      operationId: uploadAsset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                folder:
                  type: string
                  example: exhibition
                bizType:
                  type: string
                  example: exhibition_material
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AssetUploadData'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /assets:
    get:
      tags: [Assets]
      summary: 获取我的素材列表
      operationId: getAssets
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: assetType
          schema:
            $ref: '#/components/schemas/AssetType'
        - in: query
          name: sourceType
          schema:
            $ref: '#/components/schemas/AssetSourceType'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 素材分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PagedAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /digital-humans/{digitalHumanId}/equipments:
    post:
      tags: [DigitalHuman]
      summary: 绑定博物馆装备
      operationId: addDigitalHumanEquipment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DigitalHumanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindEquipmentRequest'
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DigitalHumanEquipment'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /digital-humans/{digitalHumanId}/equipments/{equipmentId}:
    delete:
      tags: [DigitalHuman]
      summary: 删除已绑定装备
      operationId: deleteDigitalHumanEquipment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DigitalHumanId'
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /museum/resources:
    get:
      tags: [Museum]
      summary: 获取博物馆资源列表
      operationId: getMuseumResources
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: providerCode
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 文博资源分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PagedMuseumResource'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Museum]
      summary: 同步博物馆资源
      operationId: syncMuseumResources
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncMuseumResourcesRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
